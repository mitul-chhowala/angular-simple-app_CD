name: Build and Deploy Angular App

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 14
        uses: actions/setup-node@v4
        with:
          node-version: '14' # Use Node 14 to avoid OpenSSL and Module errors

      - name: Install dependencies
        # Node 14 is much more stable for Angular 5
        run: npm install --legacy-peer-deps

      - name: Build Project
        # No OpenSSL fix needed for Node 14
        run: npm run build -- --prod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'angular-simple-app-Mitul-2026'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9A62 }}
