name: Build and Deploy Angular App

on:
  push:
    branches:
      - master  # Ensure this matches your branch name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        # This flag is critical for your old Angular 5 project
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build --prod

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: node-app
          path: dist/  # This is the folder created by 'npm run build'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'angular-simple-app-Mitul-2026'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9A62 }}
