name: Build and Deploy Angular App

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 10
        uses: actions/setup-node@v4
        with:
          node-version: '10' # Node 10 is the most stable version for Angular 5

      - name: Clean and Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # This line fixes the 'Module Not Found' error explicitly
          npm install @angular-devkit/core@0.0.28 --save-dev

      - name: Build Project
        run: |
          # Node 10 uses older security, so no OpenSSL fix is needed
          npm run build -- --prod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'angular-simple-app-Mitul-2026'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9A62 }}
